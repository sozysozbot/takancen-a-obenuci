<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Takan-cen Corpus</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>takan=cen a obenuci <span style="font-family: LinzklarRounded"><ruby>皇<rt>たかん</rt></ruby><ruby>言<rt>せん</rt></ruby><ruby>之<rt>あ</rt></ruby><ruby>海<rt>おべぬし</rt></ruby></span></h1>
    <nav class="tabs">
      <button id="tab-dictionary" class="tab">Dictionary</button>
      <button id="tab-corpus" class="tab active">Corpus</button>
    </nav>
  </header>

  <main>
    <section id="panel-dictionary" hidden>
      <div class="search-controls">
        <input type="search" id="search-input" placeholder="Search lemma or definition…" autocomplete="off">
        <select id="pos-filter">
          <option value="">All parts of speech</option>
        </select>
      </div>
      <div id="entry-list"></div>
    </section>

    <section id="panel-corpus">
      <div id="corpus-list"></div>
    </section>
  </main>

  <dialog id="entry-modal">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button id="modal-close" type="button">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-form">
        <label>Lemma
          <input id="field-lemma" type="text">
        </label>
        <label>POS
          <select id="field-pos">
            <option value="noun">noun</option>
            <option value="verb">verb</option>
            <option value="auxiliary verb">auxiliary verb</option>
            <option value="noun particle">noun particle</option>
            <option value="verb particle">verb particle</option>
            <option value="sentence particle">sentence particle</option>
          </select>
        </label>
        <label id="conjugation-label">conjugation class
          <select id="field-conjugation">
            <option value="vowel-stem">vowel-stem</option>
            <option value="consonant-stem">consonant-stem</option>
            <option value="c-irregular">c-irregular</option>
          </select>
        </label>
        <div>
          <div class="field-label">Definitions</div>
          <div id="def-list"></div>
          <button type="button" id="add-def-btn">+ Add definition</button>
        </div>
        <label>Notes <small>(optional)</small>
          <input id="field-notes" type="text">
        </label>
      </div>
      <div class="modal-output">
        <div class="output-header">
          <span class="field-label">JSON output</span>
          <button type="button" id="copy-json-btn">Copy</button>
        </div>
        <textarea id="json-output" readonly></textarea>
      </div>
    </div>
  </dialog>

  <script type="module" src="predictTokenFormPure.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
