<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Takan-cen Corpus</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>takan=cen a obenuci <span style="font-family: LinzklarRounded"><ruby>皇<rt>たかん</rt></ruby><ruby>言<rt>せん</rt></ruby><ruby>之<rt>あ</rt></ruby><ruby>海<rt>おべぬし</rt></ruby></span></h1>
    <nav class="tabs">
      <button id="tab-dictionary" class="tab"></button>
      <button id="tab-corpus" class="tab active"></button>
    </nav>
    <div class="header-settings">
      <a href="utilities.html" target="_blank" class="tab">⚙</a>
      <div class="tabs">
        <button id="lang-en" class="tab">EN</button>
        <button id="lang-ja" class="tab">JA</button>
      </div>
      <button id="font-toggle" class="tab font-toggle-btn" title="Toggle script font">字</button>
    </div>
  </header>

  <main>
    <section id="panel-dictionary" hidden>
      <div class="search-controls">
        <input type="search" id="search-input" placeholder="Search lemma or definition…" autocomplete="off">
        <select id="pos-filter">
        </select>
      </div>
      <div id="missing-list"></div>
      <div id="entry-list"></div>
    </section>

    <section id="panel-corpus">
      <div class="search-controls">
        <select id="source-filter"></select>
      </div>
      <div id="corpus-list"></div>
    </section>
  </main>

  <dialog id="entry-modal">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button id="modal-close" type="button">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-form">
        <label><span id="modal-label-lemma"></span>
          <input id="field-lemma" type="text">
        </label>
        <div>
          <div class="field-label" id="modal-label-script"></div>
          <div id="script-list"></div>
          <button type="button" id="add-script-btn"></button>
        </div>
        <label><span id="modal-label-pos"></span>
          <select id="field-pos"></select>
        </label>
        <label id="conjugation-label"><span id="modal-label-conj"></span>
          <select id="field-conjugation"></select>
        </label>
        <div>
          <div class="field-label" id="modal-label-definitions"></div>
          <div id="def-list"></div>
          <button type="button" id="add-def-btn"></button>
        </div>
        <label><span id="modal-label-notes"></span> <small id="modal-label-optional"></small>
          <input id="field-notes" type="text">
        </label>
      </div>
      <div class="modal-output">
        <div class="output-header">
          <span class="field-label" id="modal-label-json-output"></span>
          <button type="button" id="copy-json-btn"></button>
        </div>
        <textarea id="json-output" readonly></textarea>
      </div>
    </div>
  </dialog>

  <script type="module" src="conjugateAndJoinPure.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
